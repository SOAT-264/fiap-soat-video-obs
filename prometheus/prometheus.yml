global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'traefik'
    static_configs:
      - targets: ['vp-traefik:8080'] # Porta do dashboard/api do traefik

  - job_name: 'video-services'
    metrics_path: '/metrics'
    static_configs:
      - targets: 
        - 'vp-auth-service:8000'
        - 'vp-video-service:8000'
        - 'vp-job-api-service:8000'
        - 'vp-notification-service:8000'